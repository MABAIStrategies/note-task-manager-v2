services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    environment:
      VITE_API_BASE_URL: http://localhost:4174
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev:api"
    ports:
      - "4174:4174"
    volumes:
      - .:/app
